<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- AGISOTA Linux — Victor Mono as default monospace -->
<fontconfig>

  <!-- Default monospace: Victor Mono -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Victor Mono</family>
      <family>JetBrains Mono</family>
      <family>Fira Code</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>

  <!-- Default sans-serif: Noto Sans -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <!-- Default serif: Noto Serif -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
    </prefer>
  </alias>

  <!-- Enable ligatures for Victor Mono -->
  <match target="font">
    <test name="family" compare="eq">
      <string>Victor Mono</string>
    </test>
    <edit name="fontfeatures" mode="append">
      <string>liga on</string>
      <string>calt on</string>
    </edit>
  </match>

  <!-- Subpixel rendering for Apple Retina displays -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

</fontconfig>
